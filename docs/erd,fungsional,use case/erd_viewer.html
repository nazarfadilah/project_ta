    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --border-color: #dee2e6;
            --text-color: #212529;
            --text-muted: #868e96;
            --primary: #212529;
            --primary-light: #f1f3f5;
            --sidebar-width: 320px;
            --transition: all 0.2s ease;
        }

        body.dark-mode {
            --bg-color: #141517;
            --surface-color: #1a1b1e;
            --border-color: #2c2e33;
            --text-color: #e8ebed;
            --text-muted: #909296;
            --primary: #ffffff;
            --primary-light: #25262b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Sidebar styling */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0,0,0,0.01);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .controls-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 4px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            border-color: var(--text-color);
            background-color: var(--primary-light);
        }

        .btn.active {
            background-color: var(--primary);
            color: var(--surface-color);
            border-color: var(--primary);
        }

        .btn-full {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
        }

        /* Search & Table List */
        .table-list-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--text-color);
        }

        .table-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .table-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .table-item:hover {
            background-color: var(--bg-color);
        }

        .table-item.active {
            background-color: var(--primary-light);
            color: var(--text-color);
            font-weight: 600;
            border-color: var(--border-color);
        }

        .table-badge {
            background-color: var(--border-color);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
        }

        /* Viewport Canvas */
        #viewport {
            flex: 1;
            position: relative;
            height: 100%;
            cursor: grab;
            background-color: var(--bg-color);
            user-select: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #erd-svg-container {
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #erd-svg-container svg {
            width: 5000px;
            height: 2600px;
            max-width: none;
            max-height: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: background-color 0.2s;
        }

        /* Floating Toolbar */
        .toolbar {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            gap: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            z-index: 5;
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: var(--text-color);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: var(--transition);
        }

        .toolbar-btn:hover {
            background-color: var(--bg-color);
        }

        .divider {
            width: 1px;
            background-color: var(--border-color);
            margin: 6px 3px;
        }

        /* Interactive Diagram States (Dimming/Highlighting) */
        svg .dimmed {
            opacity: 0.15 !important;
        }

        svg .highlighted {
            opacity: 1 !important;
        }

        /* Highlighting rectangles & diamonds in plain black/white style: thicker stroke */
        svg .highlighted rect {
            stroke-width: 3.5px !important;
        }

        svg .highlighted polygon {
            stroke-width: 3.5px !important;
        }

        svg .highlighted ellipse {
            stroke-width: 2.5px !important;
        }

        svg .highlighted line {
            stroke-width: 2.5px !important;
        }

        /* Dark Mode overrides inside inline SVG - purely monochrome inverting */
        body.dark-mode svg {
            background-color: #141517 !important;
        }

        body.dark-mode svg rect {
            fill: #1a1b1e !important;
            stroke: #ffffff !important;
        }
        body.dark-mode svg ellipse {
            fill: #141517 !important;
            stroke: #ffffff !important;
        }
        body.dark-mode svg polygon {
            fill: #1a1b1e !important;
            stroke: #ffffff !important;
        }
        body.dark-mode svg text {
            fill: #ffffff !important;
        }
        body.dark-mode svg line {
            stroke: #ffffff !important;
        }

        /* Hide attributes styles */
        body.hide-normal-attrs svg .attr-normal {
            display: none !important;
        }
        body.hide-all-attrs svg .attr-all {
            display: none !important;
        }

        </div>

        <!-- FLOATING TOOLBAR -->
        <div class="toolbar" onmousedown="event.stopPropagation()">
            <button class="toolbar-btn" onclick="zoomIn()" title="Zoom In">+</button>
            <button class="toolbar-btn" onclick="zoomOut()" title="Zoom Out">-</button>
            <button class="toolbar-btn" onclick="resetView()" title="Fit View">⛶</button>
            <div class="divider"></div>
            <button class="toolbar-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle Tema">🌙</button>
            <div class="divider"></div>
            <button class="toolbar-btn" onclick="exportSVG()" title="Unduh SVG">💾</button>
        </div>
    </div>

    <script>
        // Zoom and Pan States
        let zoom = 0.35;
        let panX = 40;
        let panY = 40;
        let isDragging = false;
        let startX, startY;

        const viewport = document.getElementById('viewport');
        const container = document.getElementById('erd-svg-container');
        const svgElement = container.querySelector('svg');

        const tableNames = [
            'role',
            'users',
            'guest',
            'peminjaman_transaksi',
            'invoice',
            'paket_ruangan',
            'ruangan',
            'media_file',
            'sarana',
            'detail_peminjaman_sarana',
            'reviews',
            'unblock_requests',
            'notifications',
            'berita',
            'tentang'
        ];

        // Parse SVG and assign interactive classes
        function initInteractiveSVG() {
            const allElements = Array.from(svgElement.querySelectorAll('g, line'));
            let groupElements = {};

            tableNames.forEach(t => groupElements[t] = []);

            const entityCoords = {
                role: { x: 350, y: 1550 },
                users: { x: 1000, y: 1550 },
                guest: { x: 1000, y: 900 },
                peminjaman_transaksi: { x: 1800, y: 900 },
                invoice: { x: 1800, y: 1650 },
                paket_ruangan: { x: 2500, y: 900 },
                ruangan: { x: 3200, y: 900 },
                gedung: { x: 3200, y: 300 },
                media_file: { x: 3800, y: 900 },
                sarana: { x: 1800, y: 300 },
                detail_peminjaman_sarana: { x: 2500, y: 300 },
                berita: { x: 1000, y: 2200 },
                tentang: { x: 4300, y: 1550 },
                galeri: { x: 4300, y: 2000 }
            };

            const groups = svgElement.querySelectorAll('g');
            groups.forEach(g => {
                const textNode = g.querySelector('text');
                if (!textNode) return;

                const textVal = textNode.textContent.trim();
                
                if (g.querySelector('rect') && tableNames.includes(textVal)) {
                    g.classList.add('entity-node');
                    g.setAttribute('data-table', textVal);
                    g.style.cursor = 'pointer';
                    g.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectTable(textVal);
                    });
                    groupElements[textVal].push(g);
                }
                
                const ellipse = g.querySelector('ellipse');
                if (ellipse) {
                    g.classList.add('attr-all');
                    
                    const isPk = textNode.getAttribute('text-decoration') === 'underline';
                    const isFk = textVal.toLowerCase().endsWith('id') || textVal.toLowerCase().endsWith('_id') || textVal === 'userId' || textVal === 'peminjamanId' || textVal === 'facilityId';
                    
                    if (!isPk && !isFk) {
                        g.classList.add('attr-normal');
                    } else {
                        g.classList.add('attr-key');
                    }
                    
                    const transform = g.getAttribute('transform');
                    if (transform) {
                        const match = transform.match(/translate\(([^,\s]+)[,\s]+([^\s\)]+)\)/);
                        if (match) {
                            const x = parseFloat(match[1]);
                            const y = parseFloat(match[2]);
                            
                            let minDist = Infinity;
                            let closestTable = '';
                            Object.keys(entityCoords).forEach(tKey => {
                                const dist = Math.hypot(entityCoords[tKey].x - x, entityCoords[tKey].y - y);
                                if (dist < minDist) {
                                    minDist = dist;
                                    closestTable = tKey;
                                }
                            });
                            
                            if (closestTable && minDist < 600) {
                                g.setAttribute('data-table-owner', closestTable);
                                groupElements[closestTable].push(g);
                            }
                        }
                    }
                }
                
                const polygon = g.querySelector('polygon');
                if (polygon) {
                    g.classList.add('relationship-node');
                    g.style.cursor = 'pointer';
                }
            });

            // Process lines
            const lines = svgElement.querySelectorAll('line');
            lines.forEach(line => {
                const x1 = parseFloat(line.getAttribute('x1'));
                const y1 = parseFloat(line.getAttribute('y1'));
                const x2 = parseFloat(line.getAttribute('x2'));
                const y2 = parseFloat(line.getAttribute('y2'));
                
                // Let's check if this is an attribute connector line (no relationship diamond is connected to it)
                // Midpoint check to bind lines to tables
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2;
                
                let minDist = Infinity;
                let closestTable = '';
                Object.keys(entityCoords).forEach(tKey => {
                    const dist = Math.hypot(entityCoords[tKey].x - midX, entityCoords[tKey].y - midY);
                    if (dist < minDist) {
                        minDist = dist;
                        closestTable = tKey;
                    }
                });

                // Check if this line is close to any attribute coordinates
                let connectsToAttr = false;
                let attrIsNormal = false;
                
                groups.forEach(g => {
                    if (g.classList.contains('attr-all')) {
                        const trans = g.getAttribute('transform');
                        if (trans) {
                            const match = trans.match(/translate\(([^,\s]+)[,\s]+([^\s\)]+)\)/);
                            if (match) {
                                const ax = parseFloat(match[1]);
                                const ay = parseFloat(match[2]);
                                // check if either endpoint is close to this attribute
                                if (Math.hypot(x1 - ax, y1 - ay) < 5 || Math.hypot(x2 - ax, y2 - ay) < 5) {
                                    connectsToAttr = true;
                                    if (g.classList.contains('attr-normal')) {
                                        attrIsNormal = true;
                                    }
                                }
                            }
                        }
                    }
                });
                
                if (connectsToAttr) {
                    line.classList.add('attr-all');
                    if (attrIsNormal) {
                        line.classList.add('attr-normal');
                    }
                    if (closestTable) {
                        line.setAttribute('data-table-owner', closestTable);
                        groupElements[closestTable].push(line);
                    }
                } else {
                    line.classList.add('rel-line');
                }
            });

            window.svgGroupings = groupElements;
            
            const rels = [
                { from: "role", to: "users", verb: "memiliki", type: "1:N", x: 750, y: 1500 },
                { from: "guest", to: "users", verb: "memiliki", type: "1:1", x: 1050, y: 1175 },
                { from: "guest", to: "peminjaman_transaksi", verb: "melakukan", type: "1:N", x: 1450, y: 850 },
                { from: "users", to: "peminjaman_transaksi", verb: "mengelola", type: "1:N", x: 1450, y: 1175 },
                { from: "peminjaman_transaksi", to: "invoice", verb: "memiliki", type: "1:1", x: 1850, y: 1225 },
                { from: "paket_ruangan", to: "peminjaman_transaksi", verb: "dipesan", type: "1:N", x: 2250, y: 850 },
                { from: "ruangan", to: "paket_ruangan", verb: "memiliki", type: "1:N", x: 3050, y: 850 },
                { from: "ruangan", to: "media_file", verb: "memiliki", type: "1:N", x: 3850, y: 850 },
                { from: "sarana", to: "detail_peminjaman_sarana", verb: "memiliki", type: "1:N", x: 2250, y: 200 },
                { from: "peminjaman_transaksi", to: "detail_peminjaman_sarana", verb: "memiliki", type: "1:N", x: 2250, y: 525 },
                { from: "peminjaman_transaksi", to: "reviews", verb: "memiliki", type: "1:1", x: 2250, y: 1225 },
                { from: "users", to: "unblock_requests", verb: "mengajukan", type: "1:N", x: 750, y: 1825 },
                { from: "users", to: "notifications", verb: "menerima", type: "1:N", x: 750, y: 1225 },
                { from: "users", to: "berita", verb: "menulis", type: "1:N", x: 1050, y: 1825 }
            ];
            window.rels = rels;
            
            svgElement.addEventListener('click', (e) => {
                if (e.target === svgElement || e.target.tagName === 'rect' && e.target.getAttribute('width') === '5000') {
                    clearSelection();
                }
            });
        }

        // Table counts
        const tableCounts = {
            role: 4,
            users: 12,
            guest: 9,
            peminjaman_transaksi: 21,
            invoice: 13,
            paket_ruangan: 9,
            ruangan: 8,
            media_file: 3,
            sarana: 5,
            detail_peminjaman_sarana: 4,
            reviews: 5,
            unblock_requests: 6,
            notifications: 6,
            berita: 9,
            tentang: 4
        };

        function renderSidebar() {
            const ul = document.getElementById('table-ul');
            ul.innerHTML = '';
            tableNames.sort().forEach(t => {
                const li = document.createElement('li');
                li.className = 'table-item';
                li.id = 'li-' + t;
                li.setAttribute('data-name', t);
                li.onclick = () => selectTable(t);
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = t;
                
                const badge = document.createElement('span');
                badge.className = 'table-badge';
                badge.textContent = tableCounts[t] + ' col';
                
                li.appendChild(nameSpan);
                li.appendChild(badge);
                ul.appendChild(li);
            });
        }

        let activeTable = null;

        function selectTable(tableName) {
            document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
            
            if (activeTable === tableName) {
                clearSelection();
                return;
            }

            activeTable = tableName;
            const activeLi = document.getElementById('li-' + tableName);
            if (activeLi) activeLi.classList.add('active');

            const svgElements = svgElement.querySelectorAll('g, line, polygon');
            svgElements.forEach(el => {
                el.classList.add('dimmed');
                el.classList.remove('highlighted');
            });

            const tableNodes = window.svgGroupings[tableName] || [];
            tableNodes.forEach(node => {
                node.classList.remove('dimmed');
                node.classList.add('highlighted');
            });

            window.rels.forEach(r => {
                if (r.from === tableName || r.to === tableName) {
                    const diamondX = r.x;
                    const diamondY = r.y;
                    
                    const diamonds = svgElement.querySelectorAll('.relationship-node');
                    diamonds.forEach(d => {
                        const trans = d.getAttribute('transform');
                        if (trans && trans.includes('translate(' + diamondX + ',' + diamondY + ')')) {
                            d.classList.remove('dimmed');
                            d.classList.add('highlighted');
                        }
                    });

                    const relLines = svgElement.querySelectorAll('.rel-line');
                    relLines.forEach(l => {
                        const x1 = parseFloat(l.getAttribute('x1'));
                        const y1 = parseFloat(l.getAttribute('y1'));
                        const x2 = parseFloat(l.getAttribute('x2'));
                        const y2 = parseFloat(l.getAttribute('y2'));
                        
                        const isNearDiamond = Math.hypot(x1 - diamondX, y1 - diamondY) < 10 || Math.hypot(x2 - diamondX, y2 - diamondY) < 10;
                        if (isNearDiamond) {
                            l.classList.remove('dimmed');
                            l.classList.add('highlighted');
                        }
                    });
                }
            });

            const coords = {
                role: { x: 450, y: 1500 },
                users: { x: 1050, y: 1500 },
                guest: { x: 1050, y: 850 },
                peminjaman_transaksi: { x: 1850, y: 850 },
                invoice: { x: 1850, y: 1600 },
                paket_ruangan: { x: 2650, y: 850 },
                ruangan: { x: 3450, y: 850 },
                media_file: { x: 4250, y: 850 },
                sarana: { x: 1850, y: 200 },
                detail_peminjaman_sarana: { x: 2650, y: 200 },
                reviews: { x: 2650, y: 1600 },
                unblock_requests: { x: 450, y: 2150 },
                notifications: { x: 450, y: 950 },
                berita: { x: 1050, y: 2150 },
                tentang: { x: 4250, y: 1600 }
            };

            const target = coords[tableName];
            if (target) {
                zoomToCoords(target.x, target.y);
            }
        }

        function clearSelection() {
            activeTable = null;
            document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
            
            const svgElements = svgElement.querySelectorAll('g, line, polygon');
            svgElements.forEach(el => {
                el.classList.remove('dimmed');
                el.classList.remove('highlighted');
            });
        }

        function updateTransform() {
            container.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')';
        }

        function zoomIn() {
            zoom = Math.min(zoom * 1.25, 4.0);
            updateTransform();
        }

        function zoomOut() {
            zoom = Math.max(zoom / 1.25, 0.1);
            updateTransform();
        }

        function resetView() {
            zoom = 0.35;
            panX = 40;
            panY = 40;
            updateTransform();
            clearSelection();
        }

        function zoomToCoords(x, y) {
            const vWidth = viewport.clientWidth;
            const vHeight = viewport.clientHeight;
            
            zoom = 0.6;
            panX = vWidth / 2 - x * zoom;
            panY = vHeight / 2 - y * zoom;
            updateTransform();
        }

        function startPan(e) {
            if (e.target.closest('.toolbar')) return;
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            document.addEventListener('mousemove', dragPan);
            document.addEventListener('mouseup', endPan);
        }

        function dragPan(e) {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        }

        function endPan() {
            isDragging = false;
            document.removeEventListener('mousemove', dragPan);
            document.removeEventListener('mouseup', endPan);
        }

        function zoomWheel(e) {
            e.preventDefault();
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const svgX = (mouseX - panX) / zoom;
            const svgY = (mouseY - panY) / zoom;

            const scaleFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            zoom = Math.min(Math.max(zoom * scaleFactor, 0.1), 4.0);

            panX = mouseX - svgX * zoom;
            panY = mouseY - svgY * zoom;

            updateTransform();
        }

        function setAttributeFilter(filter) {
            document.getElementById('btn-attr-all').classList.remove('active');
            document.getElementById('btn-attr-key').classList.remove('active');
            document.getElementById('btn-attr-none').classList.remove('active');
            
            document.getElementById('btn-attr-' + filter).classList.add('active');

            document.body.classList.remove('hide-normal-attrs', 'hide-all-attrs');
            
            if (filter === 'key') {
                document.body.classList.add('hide-normal-attrs');
            } else if (filter === 'none') {
                document.body.classList.add('hide-all-attrs');
            }
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            
            const btn = document.getElementById('theme-btn');
            if (body.classList.contains('dark-mode')) {
                btn.textContent = '☀️';
            } else {
                btn.textContent = '🌙';
            }
        }

        function filterTableList() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const items = document.querySelectorAll('.table-item');
            items.forEach(item => {
                const name = item.getAttribute('data-name');
                if (name.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function exportSVG() {
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(svgElement);

            if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            if(!source.match(/^<svg[^>]+xmlns\:xlink="http\:\/\/www\.w3\.org\/1999\/xlink"/)){
                source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
            }

            const isDark = document.body.classList.contains('dark-mode');
            if (isDark) {
                const styleOverride = `<style>
                    svg { background-color: #141517 !important; }
                    rect { fill: #1a1b1e !important; stroke: #ffffff !important; }
                    ellipse { fill: #141517 !important; stroke: #ffffff !important; }
                    polygon { fill: #1a1b1e !important; stroke: #ffffff !important; }
                    text { fill: #ffffff !important; }
                    line { stroke: #ffffff !important; }
                </style>`;
                source = source.replace(/<defs>/, '<defs>' + styleOverride);
            }

            const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = "erd_chen_siprasa.svg";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        window.onload = () => {
            initInteractiveSVG();
            renderSidebar();
            resetView();
        };
    </script>
