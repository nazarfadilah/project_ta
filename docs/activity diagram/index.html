<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPRASA - Activity Diagram Viewer</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #ffffff;
      --bg-sidebar: #ffffff;
      --text-primary: #000000;
      --text-secondary: #222222;
      --text-muted: #555555;
      --border-color: #000000;
      
      --accent-color: #000000;
      --accent-hover: #333333;
      --accent-light: rgba(0, 0, 0, 0.05);
      
      --sidebar-text: #000000;
      --sidebar-text-muted: #555555;
      
      --shadow-sm: none;
      --shadow-md: none;
      --shadow-lg: none;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 2px solid var(--border-color);
      z-index: 10;
    }

    .sidebar-brand {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--border-color);
    }

    .brand-icon {
      background-color: var(--accent-color);
      color: #ffffff;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
    }

    .brand-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .sidebar-menu-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sidebar-text-muted);
      margin-bottom: 12px;
      padding-left: 8px;
      font-weight: 700;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: 6px;
      color: var(--sidebar-text);
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    .nav-item:hover {
      background-color: var(--accent-light);
      border-color: var(--border-color);
    }

    .nav-item.active {
      background-color: var(--accent-color);
      color: #ffffff;
      font-weight: 600;
      border-color: var(--accent-color);
    }

    .nav-item-icon {
      margin-right: 12px;
      font-size: 15px;
      width: 20px;
      text-align: center;
    }

    /* Main Area Styling */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Navbar */
    .top-navbar {
      height: 70px;
      background-color: var(--bg-secondary);
      border-bottom: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .doc-meta h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: var(--accent-light);
    }

    .btn-primary {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #ffffff;
    }

    .theme-toggle {
      display: none;
    }

    /* Diagram Viewer Box */
    .viewer-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #fdfdfd;
    }

    .meta-card {
      background-color: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
    }

    .meta-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-role {
      background-color: var(--accent-light);
      color: var(--accent-color);
      border: 1px solid var(--border-color);
    }

    .diagram-card {
      background-color: #ffffff;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      min-height: 400px;
    }

    .diagram-img-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: center;
    }

    .diagram-img-container img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      border: 2px solid var(--border-color);
    }

    /* Description Table Card */
    .description-card {
      background-color: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .steps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .steps-table th, .steps-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .steps-table th {
      font-weight: 600;
      color: #000000;
      background-color: #f1f1f1;
      border-bottom: 2px solid var(--border-color);
    }

    .steps-table tr:hover {
      background-color: var(--accent-light);
    }

    .step-num {
      width: 50px;
      font-weight: 700;
      color: var(--accent-color);
    }

    .step-lane {
      font-weight: 600;
      width: 150px;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #888888;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555555;
    }
  </style>
</head>
<body data-theme="light">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">A</div>
      <div class="brand-text">SIPRASA Activity</div>
    </div>
    <div class="sidebar-menu">
      <h6 class="sidebar-menu-title">Activity Diagrams</h6>
      <ul class="nav-list" id="diagramList">
        <!-- JS will populate menu items here -->
      </ul>
    </div>
  </div>

  <!-- Main Content Viewport -->
  <div class="main-content">
    
    <!-- Top Bar -->
    <div class="top-navbar">
      <div class="doc-meta">
        <h1 id="activeTitle">Judul Diagram</h1>
      </div>
      <div class="top-actions">
        <button class="btn btn-primary" id="downloadBtn" title="Unduh File PNG">
          <i class="fas fa-download"></i> Unduh PNG
        </button>
        <button class="btn" id="downloadDrawioBtn" title="Unduh File .drawio untuk Diedit">
          <i class="fas fa-file-code"></i> Unduh .drawio
        </button>
      </div>
    </div>

    <!-- Scrollable Viewer Box -->
    <div class="viewer-area">
      
      <!-- Meta Information Card -->
      <div class="meta-card">
        <p id="activeDesc" style="font-size: 14px; line-height: 1.6; color: var(--text-secondary);">
          Deskripsi diagram di sini.
        </p>
        <div class="meta-tag-row" id="activeRoles">
          <!-- Tags populated by JS -->
        </div>
      </div>

      <!-- Diagram Graphics Box -->
      <div class="diagram-card">
        <div class="diagram-img-container" id="imageContainer">
          <!-- Image loaded live here by JavaScript -->
        </div>
      </div>

      <!-- Steps Description Box -->
      <div class="description-card">
        <h5 class="card-title">
          <i class="fas fa-list-ol text-accent" style="color: var(--accent-color);"></i> Detail Alur Aktivitas
        </h5>
        <div class="table-responsive">
          <table class="steps-table">
            <thead>
              <tr>
                <th style="width: 60px;">No</th>
                <th style="width: 150px;">Aktor / Pelaku</th>
                <th>Deskripsi Aktivitas</th>
              </tr>
            </thead>
            <tbody id="stepsTableBody">
              <!-- JS will write rows here -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Theme logic removed

    // CRUD steps definition builder
    function getCrudSteps(actor, ds, dp) {
      return [
        [actor, `Membuka menu kelola data ${ds}`],
        ["System", `Menampilkan daftar data ${dp} yang tersimpan di sistem`],
        [actor, `Memilih tombol tambah data ${ds}`],
        ["System", "Menampilkan halaman/form input data baru"],
        [actor, `Menginput data form ${ds} secara lengkap dan menekan tombol Simpan`],
        ["System", "Memvalidasi kelengkapan dan format data masukan"],
        ["System", "Percabangan validasi: Jika data TIDAK valid, tampilkan notifikasi kesalahan & arahkan kembali ke form input"],
        ["System", "Percabangan validasi: Jika data VALID, simpan data ke database & tampilkan pesan sukses"],
        ["System", "Kembali ke halaman daftar data utama (index)"]
      ];
    }

    // Diagrams metadata and steps definition
    const diagrams = {
      "1_login_sistem": {
        "title": "1. Login Sistem",
        "description": "Proses masuk sistem bagi seluruh pengguna (Aktor) dengan verifikasi kredensial.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka halaman utama website dan mengklik tombol Login"],
          ["System", "Menampilkan form login (input email dan password)"],
          ["Aktor", "Menginputkan kredensial login secara lengkap dan mengklik submit"],
          ["System", "Memverifikasi kredensial masukan ke basis data"],
          ["System", "Percabangan verifikasi: Jika password salah atau user tidak ditemukan, tampilkan peringatan error dan arahkan kembali ke form login"],
          ["System", "Percabangan verifikasi: Jika valid, buat session login aktif, verifikasi role level, dan redirect ke halaman Dashboard sesuai role"],
          ["System", "Menampilkan dashboard utama"]
        ]
      },
      "2_registrasi_akun": {
        "title": "2. Registrasi Akun",
        "description": "Proses registrasi akun baru oleh Aktor (publik) beserta pengiriman kode verifikasi ke email.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka halaman registrasi"],
          ["System", "Menampilkan form registrasi (nama, email, password, dll)"],
          ["Aktor", "Mengisi form secara lengkap dan mengklik tombol Register"],
          ["System", "Memvalidasi data registrasi yang diinputkan"],
          ["System", "Percabangan validasi: Jika data tidak valid, tampilkan notifikasi kesalahan dan arahkan kembali ke form"],
          ["System", "Percabangan validasi: Jika valid, simpan data akun baru (Belum Aktif) dan kirim kode verifikasi ke email"],
          ["System", "Menampilkan halaman verifikasi email (input kode OTP)"],
          ["Aktor", "Menginputkan kode verifikasi dari email dan mengklik Verifikasi"],
          ["System", "Memvalidasi kode verifikasi masukan"],
          ["System", "Percabangan validasi kode: Jika salah, tampilkan pesan kesalahan dan arahkan kembali ke form verifikasi"],
          ["System", "Percabangan validasi kode: Jika benar, aktifkan status akun baru dan redirect ke halaman Login"]
        ]
      },
      "3_kelola_pengguna": {
        "title": "3. Kelola Pengguna (User Management)",
        "description": "Pengelolaan data akun pengguna oleh Aktor (tambah, lihat, ubah, hapus).",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Pengguna", "Pengguna")
      },
      "4_kelola_landing_page": {
        "title": "4. Kelola Landing Page",
        "description": "Pengelolaan data slider galeri, Frequently Asked Questions (FAQ), dan visual landing page oleh Aktor.",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Landing Page", "Landing Page")
      },
      "5_kelola_tamu": {
        "title": "5. Kelola Tamu (Guest Management)",
        "description": "Pengelolaan data profil tamu oleh Aktor.",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Tamu", "Tamu")
      },
      "6_kelola_ulasan": {
        "title": "6. Kelola Ulasan Ruangan",
        "description": "Pengelolaan ulasan dan testimoni tentang ruangan oleh Aktor.",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Ulasan", "Ulasan")
      },
      "7_kelola_ruangan": {
        "title": "7. Kelola Ruangan",
        "description": "Pengelolaan master data ruangan oleh Aktor (kapasitas, fasilitas bawaan, tarif).",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Ruangan", "Ruangan")
      },
      "8_kelola_sarana": {
        "title": "8. Kelola Sarana & Prasarana",
        "description": "Pengelolaan data sarana pendukung sewa (proyektor, kursi, meja, dll) oleh Aktor.",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Sarana & Prasarana", "Sarana & Prasarana")
      },
      "9_kelola_paket": {
        "title": "9. Kelola Paket Ruangan",
        "description": "Pengelolaan paket bundling ruangan dan sarana beserta tarif khususnya oleh Aktor.",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Paket Ruangan", "Paket Ruangan")
      },
      "10_kelola_profil": {
        "title": "10. Kelola Profil",
        "description": "Pembaruan informasi data diri dan password oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka menu profil saya"],
          ["System", "Menampilkan data profil saat ini dan form ubah profil"],
          ["Aktor", "Mengubah data diri atau password dan mengklik Simpan Perubahan"],
          ["System", "Memvalidasi format data profil baru"],
          ["System", "Percabangan validasi: Jika tidak valid, tampilkan notifikasi error"],
          ["System", "Percabangan validasi: Jika valid, simpan perubahan data profil ke database"],
          ["System", "Menampilkan pesan sukses dan memuat ulang halaman profil baru"]
        ]
      },
      "11_kelola_invoice": {
        "title": "11. Kelola & Cetak Invoice",
        "description": "Pengelolaan data invoice transaksi peminjaman oleh Aktor (update status lunas/unpaid).",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Memilih menu Invoice / detail invoice peminjaman"],
          ["System", "Menampilkan rincian invoice (tarif, fasilitas, status UNPAID)"],
          ["Aktor", "Mengubah status pembayaran menjadi PAID dan klik Simpan"],
          ["System", "Memvalidasi input status pembayaran"],
          ["System", "Percabangan validasi: Jika tidak valid, tampilkan pesan kesalahan"],
          ["System", "Percabangan validasi: Jika valid, update status invoice ke PAID, status pembayaran ke LUNAS"],
          ["System", "Mengirimkan email kuitansi/bukti pembayaran ke peminjam"]
        ]
      },
      "12_checkin": {
        "title": "12. Proses Check-In Peminjaman",
        "description": "Proses check-in peminjam pada hari H penggunaan fasilitas oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka daftar peminjaman APPROVED dan mengklik tombol Check-in"],
          ["System", "Menampilkan detail transaksi peminjaman yang siap check-in"],
          ["Aktor", "Memilih transaksi dan mengklik tombol Check-in"],
          ["System", "Memverifikasi tanggal check-in dengan jadwal sewa"],
          ["System", "Jika tidak cocok (belum waktunya), tampilkan peringatan error"],
          ["System", "Jika valid, ubah status transaksi menjadi CHECK_IN dan catat waktu check-in"],
          ["System", "Menampilkan status ACTIVE"]
        ]
      },
      "13_checkout": {
        "title": "13. Proses Check-Out Peminjaman",
        "description": "Proses check-out peminjam setelah pemakaian fasilitas berakhir oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka daftar peminjaman aktif (CHECK_IN) dan mengklik tombol Check-out"],
          ["System", "Menampilkan form input check-out"],
          ["Aktor", "Melakukan inspeksi ruangan/sarana dan input kerusakan (jika ada)"],
          ["System", "Kalkulasi otomatis biaya tambahan/denda jika ada kerusakan"],
          ["System", "Mengubah status transaksi menjadi CHECK_OUT, catat waktu keluar, dan cetak kuitansi lunas"]
        ]
      },
      "14_verifikasi_peminjaman": {
        "title": "14. Verifikasi & Approval Peminjaman",
        "description": "Verifikasi dan persetujuan pengajuan reservasi masuk oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka detail pengajuan sewa pending"],
          ["System", "Menampilkan detail permohonan dan berkas syarat yang diunggah"],
          ["Aktor", "Memeriksa validitas berkas peminjaman"],
          ["Aktor", "Memutuskan Setuju atau Tolak"],
          ["Aktor", "Keputusan Tolak: Input alasan penolakan -> System mengubah status ke REJECTED dan kirim email pemberitahuan"],
          ["Aktor", "Keputusan Setuju: Klik Approve -> System mengubah status ke APPROVED dan meng-generate Invoice awal (UNPAID)"]
        ]
      },
      "15_ajukan_peminjaman": {
        "title": "15. Ajukan Peminjaman (Reservasi)",
        "description": "Pengajuan permohonan sewa ruangan dan sarana oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Memilih menu pengajuan peminjaman"],
          ["System", "Menampilkan form reservasi (tanggal sewa, ruangan, sarana, dll)"],
          ["Aktor", "Mengisi formulir sewa lengkap dan mengunggah berkas permohonan"],
          ["System", "Memeriksa ketersediaan ruangan dan sarana pada jadwal terpilih"],
          ["System", "Percabangan ketersediaan: Jika terbooking, tampilkan pesan error penuh"],
          ["System", "Percabangan ketersediaan: Jika kosong, simpan transaksi sewa baru dengan status PENDING"]
        ]
      },
      "16_batalkan_peminjaman": {
        "title": "16. Batalkan Peminjaman",
        "description": "Proses pembatalan sewa fasilitas sebelum hari H oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka daftar reservasi aktif miliknya"],
          ["System", "Menampilkan daftar peminjaman aktif"],
          ["Aktor", "Memilih peminjaman dan mengklik tombol Batal Peminjaman"],
          ["System", "Menampilkan modal konfirmasi pembatalan"],
          ["Aktor", "Mengonfirmasi persetujuan pembatalan"],
          ["System", "Mengubah status transaksi menjadi CANCELLED dan mengosongkan kembali jadwal sewa terkait"]
        ]
      },
      "17_lihat_laporan": {
        "title": "17. Lihat Laporan Penggunaan",
        "description": "Penyaringan dan cetak laporan okupansi/transaksi sewa oleh Aktor.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka halaman Laporan Penggunaan"],
          ["System", "Menampilkan form filter range tanggal laporan"],
          ["Aktor", "Menginputkan range tanggal awal/akhir dan mengklik tombol Filter"],
          ["System", "Melakukan query data agregat sewa dari database"],
          ["System", "Menampilkan statistik penggunaan dan tombol Cetak Laporan"],
          ["Aktor", "Memilih tombol Cetak Laporan"],
          ["System", "Mengekspor data ke file PDF siap cetak untuk diunduh"]
        ]
      },
      "18_kelola_berita": {
        "title": "18. Kelola Berita",
        "description": "Pengelolaan data berita (tulis draf pengumuman/berita) oleh Aktor.",
        "roles": ["Aktor"],
        "steps": getCrudSteps("Aktor", "Berita", "Berita")
      },
      "19_publish_berita": {
        "title": "19. Publish Berita",
        "description": "Proses mempublikasikan draf berita oleh Aktor ke laman publik.",
        "roles": ["Aktor"],
        "steps": [
          ["Aktor", "Membuka draf berita yang akan dipublish"],
          ["System", "Menampilkan isi berita dan tombol Publish"],
          ["Aktor", "Mengklik tombol Publish"],
          ["System", "Menampilkan modal konfirmasi publikasi"],
          ["Aktor", "Mengonfirmasi publikasi"],
          ["System", "Mengubah status berita ke PUBLISHED dan menampilkannya di laman publik"]
        ]
      }
    };

    // Populate Sidebar Navigation
    const diagramList = document.getElementById('diagramList');
    let activeKey = Object.keys(diagrams)[0];

    Object.entries(diagrams).forEach(([key, data]) => {
      const li = document.createElement('li');
      const cleanTitle = data.title.split('. ')[1] || data.title;
      li.className = `nav-item ${key === activeKey ? 'active' : ''}`;
      li.innerHTML = `<i class="fas fa-project-diagram nav-item-icon"></i> ${cleanTitle}`;
      li.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        activeKey = key;
        loadDiagram(key);
      });
      diagramList.appendChild(li);
    });

    // Populate metadata & description table
    function loadDiagram(key) {
      const data = diagrams[key];
      document.getElementById('activeTitle').innerText = data.title;
      document.getElementById('activeDesc').innerText = data.description;
      
      // Roles tags
      const rolesContainer = document.getElementById('activeRoles');
      rolesContainer.innerHTML = '';
      data.roles.forEach(role => {
        const span = document.createElement('span');
        span.className = 'tag tag-role';
        span.innerText = role;
        rolesContainer.appendChild(span);
      });

      // Display PNG Image
      const container = document.getElementById('imageContainer');
      container.innerHTML = `<img src="${key}.png" alt="${data.title}" />`;

      // Write descriptive action table
      const tbody = document.getElementById('stepsTableBody');
      tbody.innerHTML = '';
      
      let stepCounter = 1;
      data.steps.forEach(step => {
        const [actor, desc] = step;
        const tr = document.createElement('tr');
        
        let displayActor = actor === 'User' ? 'Aktor' : (actor === 'System' ? 'Sistem' : actor);
        let actorLabel = `<span class="step-lane" style="color: ${actor === 'User' ? 'var(--accent-color)' : 'var(--text-secondary)'}; font-weight: 700;">${displayActor}</span>`;
        
        tr.innerHTML = `
          <td class="step-num">${stepCounter++}</td>
          <td>${actorLabel}</td>
          <td>${desc}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Download action
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const downloadLink = document.createElement("a");
      downloadLink.href = `${activeKey}.png`;
      downloadLink.download = `${activeKey}.png`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Download Drawio action
    document.getElementById('downloadDrawioBtn').addEventListener('click', () => {
      const downloadLink = document.createElement("a");
      downloadLink.href = `${activeKey}.drawio`;
      downloadLink.download = `${activeKey}.drawio`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Default load
    loadDiagram(activeKey);
  </script>
</body>
</html>
