<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPRASA - Activity Diagram Viewer</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #ffffff;
      --bg-sidebar: #ffffff;
      --text-primary: #000000;
      --text-secondary: #222222;
      --text-muted: #555555;
      --border-color: #000000;
      
      --accent-color: #000000;
      --accent-hover: #333333;
      --accent-light: rgba(0, 0, 0, 0.05);
      
      --sidebar-text: #000000;
      --sidebar-text-muted: #555555;
      
      --shadow-sm: none;
      --shadow-md: none;
      --shadow-lg: none;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 2px solid var(--border-color);
      z-index: 10;
    }

    .sidebar-brand {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--border-color);
    }

    .brand-icon {
      background-color: var(--accent-color);
      color: #ffffff;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
    }

    .brand-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .sidebar-menu-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sidebar-text-muted);
      margin-bottom: 12px;
      padding-left: 8px;
      font-weight: 700;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: 6px;
      color: var(--sidebar-text);
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    .nav-item:hover {
      background-color: var(--accent-light);
      border-color: var(--border-color);
    }

    .nav-item.active {
      background-color: var(--accent-color);
      color: #ffffff;
      font-weight: 600;
      border-color: var(--accent-color);
    }

    .nav-item-icon {
      margin-right: 12px;
      font-size: 15px;
      width: 20px;
      text-align: center;
    }

    /* Main Area Styling */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Navbar */
    .top-navbar {
      height: 70px;
      background-color: var(--bg-secondary);
      border-bottom: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .doc-meta h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: var(--accent-light);
    }

    .btn-primary {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #ffffff;
    }

    .theme-toggle {
      display: none;
    }

    /* Diagram Viewer Box */
    .viewer-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #fdfdfd;
    }

    .meta-card {
      background-color: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
    }

    .meta-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-role {
      background-color: var(--accent-light);
      color: var(--accent-color);
      border: 1px solid var(--border-color);
    }

    .diagram-card {
      background-color: #ffffff;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      min-height: 400px;
    }

    .diagram-img-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: center;
    }

    .diagram-img-container img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      border: 2px solid var(--border-color);
    }

    /* Description Table Card */
    .description-card {
      background-color: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .steps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .steps-table th, .steps-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .steps-table th {
      font-weight: 600;
      color: #000000;
      background-color: #f1f1f1;
      border-bottom: 2px solid var(--border-color);
    }

    .steps-table tr:hover {
      background-color: var(--accent-light);
    }

    .step-num {
      width: 50px;
      font-weight: 700;
      color: var(--accent-color);
    }

    .step-lane {
      font-weight: 600;
      width: 150px;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #888888;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555555;
    }
  </style>
</head>
<body data-theme="light">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">A</div>
      <div class="brand-text">SIPRASA Activity</div>
    </div>
    <div class="sidebar-menu">
      <h6 class="sidebar-menu-title">Activity Diagrams</h6>
      <ul class="nav-list" id="diagramList">
        <!-- JS will populate menu items here -->
      </ul>
    </div>
  </div>

  <!-- Main Content Viewport -->
  <div class="main-content">
    
    <!-- Top Bar -->
    <div class="top-navbar">
      <div class="doc-meta">
        <h1 id="activeTitle">Judul Diagram</h1>
      </div>
      <div class="top-actions">
        <button class="btn btn-primary" id="downloadBtn" title="Unduh File PNG">
          <i class="fas fa-download"></i> Unduh PNG
        </button>
        <button class="btn" id="downloadDrawioBtn" title="Unduh File .drawio untuk Diedit">
          <i class="fas fa-file-code"></i> Unduh .drawio
        </button>
      </div>
    </div>

    <!-- Scrollable Viewer Box -->
    <div class="viewer-area">
      
      <!-- Meta Information Card -->
      <div class="meta-card">
        <p id="activeDesc" style="font-size: 14px; line-height: 1.6; color: var(--text-secondary);">
          Deskripsi diagram di sini.
        </p>
        <div class="meta-tag-row" id="activeRoles">
          <!-- Tags populated by JS -->
        </div>
      </div>

      <!-- Diagram Graphics Box -->
      <div class="diagram-card">
        <div class="diagram-img-container" id="imageContainer">
          <!-- Image loaded live here by JavaScript -->
        </div>
      </div>

      <!-- Steps Description Box -->
      <div class="description-card">
        <h5 class="card-title">
          <i class="fas fa-list-ol text-accent" style="color: var(--accent-color);"></i> Detail Alur Aktivitas
        </h5>
        <div class="table-responsive">
          <table class="steps-table">
            <thead>
              <tr>
                <th style="width: 60px;">No</th>
                <th style="width: 150px;">Aktor / Pelaku</th>
                <th>Deskripsi Aktivitas</th>
              </tr>
            </thead>
            <tbody id="stepsTableBody">
              <!-- JS will write rows here -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Theme logic removed

    // CRUD steps definition builder
    function getCrudSteps(actor, ds, dp) {
      return [
        ["User", `Membuka menu kelola data ${ds}`],
        ["System", `Menampilkan daftar data ${dp} yang tersimpan di sistem`],
        ["User", `Memilih tombol tambah data ${ds}`],
        ["System", "Menampilkan halaman/form input data baru"],
        ["User", `Menginput data form ${ds} secara lengkap dan menekan tombol Simpan`],
        ["System", "Memvalidasi kelengkapan dan format data masukan"],
        ["System", "Percabangan validasi: Jika data TIDAK valid, tampilkan notifikasi kesalahan & arahkan kembali ke form input"],
        ["System", "Percabangan validasi: Jika data VALID, simpan data ke database & tampilkan pesan sukses"],
        ["System", "Kembali ke halaman daftar data utama (index)"]
      ];
    }

    // Diagrams metadata and steps definition
    const diagrams = {
      "1_login_sistem": {
        "title": "1. Login Sistem",
        "description": "Proses masuk sistem bagi seluruh pengguna (Admin, Petugas, Pimpinan, Guest) dengan verifikasi kredensial.",
        "roles": ["Admin", "Petugas", "Pimpinan", "Guest"],
        "steps": [
          ["User", "Membuka halaman utama website dan mengklik tombol Login"],
          ["System", "Menampilkan form login (input email dan password)"],
          ["User", "Menginputkan kredensial login secara lengkap dan mengklik submit"],
          ["System", "Memverifikasi kredensial masukan ke basis data"],
          ["System", "Percabangan verifikasi: Jika password salah atau user tidak ditemukan, tampilkan peringatan error dan arahkan kembali ke form login"],
          ["System", "Percabangan verifikasi: Jika valid, buat session login aktif, verifikasi role level, dan redirect ke halaman Dashboard sesuai role"],
          ["System", "Menampilkan dashboard utama"]
        ]
      },
      "2_kelola_pengguna": {
        "title": "2. Kelola Pengguna",
        "description": "Pengelolaan master data pengguna aplikasi oleh Admin (tambah, lihat list, edit, dan validasi).",
        "roles": ["Admin"],
        "steps": getCrudSteps("Admin", "Pengguna", "Pengguna")
      },
      "3_kelola_tamu": {
        "title": "3. Kelola Tamu",
        "description": "Pengelolaan data tamu (Guest) penyewa oleh Admin or Petugas (tambah data identitas, kontak, dan instansi).",
        "roles": ["Admin", "Petugas"],
        "steps": getCrudSteps("Admin / Petugas", "Tamu", "Tamu")
      },
      "4_kelola_gedung": {
        "title": "4. Kelola Gedung",
        "description": "Pengelolaan master data gedung asrama haji oleh Admin (tambah, ubah, dan kelola ketersediaan).",
        "roles": ["Admin"],
        "steps": getCrudSteps("Admin", "Gedung", "Gedung")
      },
      "5_kelola_ruangan": {
        "title": "5. Kelola Ruangan",
        "description": "Pengelolaan data ruangan di setiap gedung oleh Petugas (kapasitas, fasilitas bawaan, dan tarif).",
        "roles": ["Petugas", "Pimpinan"],
        "steps": getCrudSteps("Petugas", "Ruangan", "Ruangan")
      },
      "6_kelola_sarana": {
        "title": "6. Kelola Sarana & Fasilitas",
        "description": "Pengelolaan data sarana pendukung (kursi, sound system, proyektor, dll) oleh Petugas.",
        "roles": ["Petugas", "Pimpinan"],
        "steps": getCrudSteps("Petugas", "Sarana & Fasilitas", "Sarana & Fasilitas")
      },
      "7_kelola_paket": {
        "title": "7. Kelola Paket Ruangan",
        "description": "Pengelolaan paket bundling sewa ruangan beserta durasi dan kelengkapannya oleh Petugas.",
        "roles": ["Petugas", "Pimpinan"],
        "steps": getCrudSteps("Petugas", "Paket Ruangan", "Paket Ruangan")
      },
      "8_ajukan_peminjaman": {
        "title": "8. Ajukan Peminjaman (Reservasi)",
        "description": "Proses reservasi/peminjaman fasilitas asrama haji oleh Tamu (Guest).",
        "roles": ["Guest"],
        "steps": [
          ["User", "Memilih menu pengajuan peminjaman di website publik"],
          ["System", "Menampilkan form input peminjaman (ruangan, sarana, tanggal mulai/selesai)"],
          ["User", "Mengisi formulir peminjaman secara lengkap dan mengunggah berkas syarat"],
          ["System", "Memeriksa ketersediaan ruangan dan sarana pada tanggal yang dipilih"],
          ["System", "Percabangan ketersediaan: Jika sudah terbooking, tampilkan notifikasi penuh dan arahkan untuk memilih tanggal lain"],
          ["System", "Percabangan ketersediaan: Jika kosong, simpan transaksi baru dengan status: PENDING"],
          ["System", "Menampilkan bukti pengajuan pending dan mengirimkan notifikasi verifikasi ke petugas"]
        ]
      },
      "9_verifikasi_peminjaman": {
        "title": "9. Verifikasi & Approval Peminjaman",
        "description": "Proses approval dan review berkas peminjaman masuk oleh Petugas or Admin.",
        "roles": ["Admin", "Petugas", "Pimpinan (View-only)"],
        "steps": [
          ["User", "Membuka halaman daftar peminjaman pending dan memilih salah satu pengajuan"],
          ["System", "Menampilkan detail peminjaman, identitas tamu, dan berkas persyaratan yang diunggah"],
          ["User", "Memeriksa keabsahan berkas (surat permohonan, KTP, dll)"],
          ["User", "Membuat keputusan: Setujui atau Tolak pengajuan"],
          ["User", "Keputusan Tolak: Input alasan penolakan -> System mengubah status menjadi REJECTED dan mengirimkan email pemberitahuan"],
          ["User", "Keputusan Setuju: Klik Approve -> System mengubah status menjadi APPROVED, mencatat kuota booking, dan meng-generate Invoice awal (UNPAID)"],
          ["System", "Mengirimkan invoice tagihan via sistem/email ke peminjam"]
        ]
      },
      "10_checkin": {
        "title": "10. Proses Check-In",
        "description": "Proses check-in peminjam pada hari H penggunaan fasilitas oleh Petugas.",
        "roles": ["Petugas", "Admin"],
        "steps": [
          ["User", "Membuka daftar peminjaman berstatus APPROVED pada hari H"],
          ["System", "Menampilkan transaksi peminjaman yang siap check-in"],
          ["User", "Memilih transaksi dan mengklik tombol Check-in"],
          ["System", "Memverifikasi kecocokan tanggal check-in dengan jadwal peminjaman"],
          ["System", "Jika tidak cocok (belum hari H), tampilkan peringatan pemblokiran"],
          ["System", "Jika cocok, ubah status transaksi menjadi CHECK_IN dan catat timestamp waktu masuk tamu"],
          ["System", "Menampilkan status ACTIVE (Tamu sudah masuk)"]
        ]
      },
      "11_checkout": {
        "title": "11. Proses Check-Out",
        "description": "Proses check-out peminjam setelah pemakaian fasilitas berakhir oleh Petugas.",
        "roles": ["Petugas", "Admin"],
        "steps": [
          ["User", "Membuka daftar peminjaman aktif dan mengklik tombol Check-out"],
          ["System", "Menampilkan form kelengkapan check-out"],
          ["User", "Melakukan inspeksi fisik ruangan/sarana dan menginputkan kondisi kerusakan (jika ada)"],
          ["System", "Menghitung denda secara otomatis jika ada kerusakan/kehilangan sarana"],
          ["System", "Mengubah status transaksi menjadi CHECK_OUT, mencatat timestamp waktu keluar, dan mencetak kwitansi lunas"],
          ["System", "Menyimpan seluruh log pemakaian di sistem database"]
        ]
      },
      "12_kelola_invoice": {
        "title": "12. Kelola & Cetak Invoice",
        "description": "Pengelolaan data invoice (pembayaran sewa ruangan dan fasilitas) oleh Admin atau Petugas, termasuk konfirmasi status pembayaran PAID/LUNAS dan pengiriman email bukti pembayaran.",
        "roles": ["Admin", "Petugas"],
        "steps": [
          ["User", "Membuka halaman rincian/detail invoice pada peminjaman terkait"],
          ["System", "Menampilkan rincian invoice (tarif, fasilitas, status UNPAID, dan tombol konfirmasi lunas)"],
          ["User", "Mengubah status pembayaran menjadi PAID / Lunas dan mengklik Simpan"],
          ["System", "Memvalidasi input status pembayaran"],
          ["System", "Percabangan validasi: Jika input tidak valid, tampilkan notifikasi kesalahan"],
          ["System", "Percabangan validasi: Jika valid, perbarui status invoice ke PAID, status pembayaran ke LUNAS, catat tanggal pembayaran, dan simpan ke database"],
          ["System", "Mengirimkan email notifikasi bukti pembayaran (invoice paid) ke peminjam"],
          ["System", "Menampilkan pesan sukses dan memicu tombol cetak kwitansi lunas"]
        ]
      },
      "13_kelola_berita": {
        "title": "13. Kelola Berita",
        "description": "Pengelolaan berita/pengumuman website oleh Petugas (sebagai draft) dan dipublish oleh Admin.",
        "roles": ["Petugas", "Admin"],
        "steps": getCrudSteps("Petugas / Admin", "Berita", "Berita")
      },
      "14_kelola_landing_page": {
        "title": "14. Kelola Landing Page",
        "description": "Pengelolaan profil asrama haji, FAQ, galeri slider, dan kontak oleh Admin.",
        "roles": ["Admin"],
        "steps": getCrudSteps("Admin", "Landing Page", "Landing Page")
      },
      "15_lihat_laporan": {
        "title": "15. Lihat & Cetak Laporan",
        "description": "Penyusunan filter dan ekspor laporan penggunaan fasilitas oleh Admin or Pimpinan.",
        "roles": ["Admin", "Pimpinan"],
        "steps": [
          ["User", "Membuka menu Laporan Penggunaan"],
          ["System", "Menampilkan halaman filter laporan (range tanggal, jenis ruangan, status transaksi)"],
          ["User", "Memasukkan kriteria tanggal/ruangan dan mengklik tombol Tampilkan"],
          ["System", "Melakukan query agregat dan kalkulasi statistik penggunaan dari database"],
          ["System", "Menampilkan tabel data, grafik okupansi, dan tombol aksi"],
          ["User", "Memilih tombol Cetak Laporan (PDF) jika ingin mengunduh berkas fisik"],
          ["System", "Mengekspor data ke file PDF siap cetak dan memicu unduhan di browser"]
        ]
      },
      "16_kelola_profil": {
        "title": "16. Kelola Profil",
        "description": "Pembaharuan data diri akun pengguna (ubah email, nama lengkap, dan password).",
        "roles": ["Admin", "Petugas", "Pimpinan", "Guest"],
        "steps": getCrudSteps("Semua Pengguna", "Profil Akun", "Profil Akun")
      },
      "17_batalkan_peminjaman": {
        "title": "17. Batalkan Peminjaman",
        "description": "Proses pembatalan sewa fasilitas sebelum hari H oleh Guest (Peminjam) or Admin.",
        "roles": ["Guest", "Admin"],
        "steps": [
          ["User", "Membuka menu 'Peminjaman Saya' di dashboard akun"],
          ["System", "Menampilkan daftar reservasi aktif yang berstatus pending/approved"],
          ["User", "Memilih salah satu jadwal dan mengklik tombol Batal Peminjaman"],
          ["System", "Menampilkan popup konfirmasi pembatalan (Are you sure?)"],
          ["User", "Mengklik 'Ya' untuk menyetujui pembatalan"],
          ["System", "Mengubah status transaksi menjadi CANCELLED dan mengosongkan kembali plot jadwal/ruangan"],
          ["System", "Menampilkan notifikasi pembatalan sukses dan menyegarkan tampilan daftar"]
        ]
      },
      "18_lihat_ketersediaan": {
        "title": "18. Lihat Data Ketersediaan",
        "description": "Pengecekan jadwal kosong ruangan dan fasilitas sebelum pengajuan oleh Peminjam or Petugas.",
        "roles": ["Guest", "Petugas", "Admin", "Pimpinan"],
        "steps": [
          ["User", "Membuka halaman Kalender Ketersediaan"],
          ["System", "Menampilkan list gedung dan kalender okupansi"],
          ["User", "Memilih filter gedung/ruangan dan menentukan bulan/tahun"],
          ["System", "Melakukan query jadwal sewa aktif dari database"],
          ["System", "Menampilkan warna indikator pada kalender (Merah: Terisi/Terbooking, Hijau: Kosong/Tersedia)"],
          ["System", "Menampilkan detail jam jika tanggal diklik"]
        ]
      },
      "19_kelola_gambar": {
        "title": "19. Kelola Gambar (Slideshow / Galeri)",
        "description": "Pengelolaan slider promosi dan galeri foto asrama haji oleh Admin.",
        "roles": ["Admin"],
        "steps": getCrudSteps("Admin", "Gambar Galeri", "Gambar Galeri")
      },
      "20_kelola_tentang": {
        "title": "20. Kelola Tentang Halaman",
        "description": "Pengelolaan data sejarah, visi-misi, dan struktur organisasi asrama haji oleh Admin.",
        "roles": ["Admin"],
        "steps": getCrudSteps("Admin", "Tentang Halaman", "Tentang Halaman")
      }
    };

    // Populate Sidebar Navigation
    const diagramList = document.getElementById('diagramList');
    let activeKey = Object.keys(diagrams)[0];

    Object.entries(diagrams).forEach(([key, data]) => {
      const li = document.createElement('li');
      const cleanTitle = data.title.split('. ')[1] || data.title;
      li.className = `nav-item ${key === activeKey ? 'active' : ''}`;
      li.innerHTML = `<i class="fas fa-project-diagram nav-item-icon"></i> ${cleanTitle}`;
      li.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        activeKey = key;
        loadDiagram(key);
      });
      diagramList.appendChild(li);
    });

    // Populate metadata & description table
    function loadDiagram(key) {
      const data = diagrams[key];
      document.getElementById('activeTitle').innerText = data.title;
      document.getElementById('activeDesc').innerText = data.description;
      
      // Roles tags
      const rolesContainer = document.getElementById('activeRoles');
      rolesContainer.innerHTML = '';
      data.roles.forEach(role => {
        const span = document.createElement('span');
        span.className = 'tag tag-role';
        span.innerText = role;
        rolesContainer.appendChild(span);
      });

      // Display PNG Image
      const container = document.getElementById('imageContainer');
      // If key is '18_kelola_tentang', make sure it loads 18_kelola_tentang.png, etc.
      container.innerHTML = `<img src="${key}.png" alt="${data.title}" />`;

      // Write descriptive action table
      const tbody = document.getElementById('stepsTableBody');
      tbody.innerHTML = '';
      
      let stepCounter = 1;
      data.steps.forEach(step => {
        const [actor, desc] = step;
        const tr = document.createElement('tr');
        
        let displayActor = actor === 'User' ? 'Aktor' : (actor === 'System' ? 'Sistem' : actor);
        let actorLabel = `<span class="step-lane" style="color: ${actor === 'User' ? 'var(--accent-color)' : 'var(--text-secondary)'}; font-weight: 700;">${displayActor}</span>`;
        
        tr.innerHTML = `
          <td class="step-num">${stepCounter++}</td>
          <td>${actorLabel}</td>
          <td>${desc}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Download action
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const downloadLink = document.createElement("a");
      downloadLink.href = `${activeKey}.png`;
      downloadLink.download = `${activeKey}.png`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Download Drawio action
    document.getElementById('downloadDrawioBtn').addEventListener('click', () => {
      const downloadLink = document.createElement("a");
      downloadLink.href = `${activeKey}.drawio`;
      downloadLink.download = `${activeKey}.drawio`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Default load
    loadDiagram(activeKey);
  </script>
</body>
</html>
