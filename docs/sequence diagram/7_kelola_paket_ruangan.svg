  <line x1="860.0" y1="645" x2="670.0" y2="645" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="765.0" y="637" text-anchor="middle" class="message-text">Return data</text>
  <line x1="670.0" y1="695" x2="290.0" y2="695" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.0" y="687" text-anchor="middle" class="message-text">Tampilkan index (Tombol Tambah & Aksi visible)</text>
