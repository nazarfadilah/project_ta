<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1180" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 18px; fill: #1e293b; }
      .participant-box { rx: 6px; ry: 6px; }
      .participant-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 13px; fill: #ffffff; text-anchor: middle; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .message-line { stroke-width: 2; }
      .message-text { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #334155; }
      .self-msg-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #334155; }
      .alt-box { fill: #f8fafc; fill-opacity: 0.5; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4,4; rx: 4px; ry: 4px; }
      .alt-label { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 11px; fill: #475569; }
      .alt-cond { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 11px; fill: #64748b; }
      .activation-bar { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; width: 12px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#334155" />
    </marker>
    <marker id="reply-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#475569" stroke-width="2" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="40" y="45" class="title">3. Kelola Tamu (Guest Management)</text>
  <line x1="100.0" y1="80" x2="100.0" y2="1120" class="lifeline" />
  <line x1="290.0" y1="80" x2="290.0" y2="1120" class="lifeline" />
  <line x1="480.0" y1="80" x2="480.0" y2="1120" class="lifeline" />
  <line x1="670.0" y1="80" x2="670.0" y2="1120" class="lifeline" />
  <line x1="860.0" y1="80" x2="860.0" y2="1120" class="lifeline" />
  <g transform="translate(20.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#C9A961" />
    <text x="80" y="22" class="participant-text">Actor</text>
  </g>
  <g transform="translate(210.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#17A2B8" />
    <text x="80" y="22" class="participant-text">View</text>
  </g>
  <g transform="translate(400.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#6C757D" />
    <text x="80" y="22" class="participant-text">Middleware</text>
  </g>
  <g transform="translate(590.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#007BFF" />
    <text x="80" y="22" class="participant-text">Controller</text>
  </g>
  <g transform="translate(780.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#28A745" />
    <text x="80" y="22" class="participant-text">Database</text>
  </g>
  <g transform="translate(20.0, 1130)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#C9A961" />
    <text x="80" y="22" class="participant-text">Actor</text>
  </g>
  <g transform="translate(210.0, 1130)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#17A2B8" />
    <text x="80" y="22" class="participant-text">View</text>
  </g>
  <g transform="translate(400.0, 1130)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#6C757D" />
    <text x="80" y="22" class="participant-text">Middleware</text>
  </g>
  <g transform="translate(590.0, 1130)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#007BFF" />
    <text x="80" y="22" class="participant-text">Controller</text>
  </g>
  <g transform="translate(780.0, 1130)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#28A745" />
    <text x="80" y="22" class="participant-text">Database</text>
  </g>
  <line x1="100.0" y1="120" x2="290.0" y2="120" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="195.0" y="112" text-anchor="middle" class="message-text">Buka Halaman Kelola Tamu</text>
  <line x1="290.0" y1="170" x2="480.0" y2="170" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="385.0" y="162" text-anchor="middle" class="message-text">GET /admin/tamu-management</text>
  <line x1="480.0" y1="245" x2="670.0" y2="245" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="575.0" y="237" text-anchor="middle" class="message-text">Forward request (Read-only)</text>
  <line x1="670.0" y1="295" x2="860.0" y2="295" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="765.0" y="287" text-anchor="middle" class="message-text">Get guest list</text>
  <line x1="860.0" y1="345" x2="670.0" y2="345" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="765.0" y="337" text-anchor="middle" class="message-text">Return data</text>
  <line x1="670.0" y1="395" x2="290.0" y2="395" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.0" y="387" text-anchor="middle" class="message-text">Tampilkan index (Tombol Tambah & Aksi hidden)</text>
  <line x1="480.0" y1="470" x2="670.0" y2="470" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="575.0" y="462" text-anchor="middle" class="message-text">Forward request (Full Access)</text>
  <line x1="670.0" y1="520" x2="860.0" y2="520" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="765.0" y="512" text-anchor="middle" class="message-text">Get guest list</text>
  <line x1="860.0" y1="570" x2="670.0" y2="570" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="765.0" y="562" text-anchor="middle" class="message-text">Return data</text>
  <line x1="670.0" y1="620" x2="290.0" y2="620" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.0" y="612" text-anchor="middle" class="message-text">Tampilkan index (Tombol Tambah & Aksi visible)</text>
  <rect x="70" y="210" width="820" height="460" class="alt-box" />
  <rect x="70" y="210" width="45" height="18" fill="#94a3b8" rx="2" ry="2" />
  <text x="92" y="223" fill="#ffffff" font-family="Inter, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">alt</text>
  <text x="125" y="224" class="alt-cond">[Role == Pimpinan (2)]</text>
  <line x1="70" y1="435" x2="890" y2="435" stroke="#94a3b8" stroke-dasharray="3,3" />
  <text x="85" y="451" class="alt-cond">[Role == Admin (1)]</text>
  <line x1="100.0" y1="685" x2="290.0" y2="685" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="195.0" y="677" text-anchor="middle" class="message-text">Klik Tambah Tamu (Admin)</text>
  <line x1="290.0" y1="735" x2="480.0" y2="735" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="385.0" y="727" text-anchor="middle" class="message-text">POST /admin/tamu-management</text>
  <line x1="480.0" y1="810" x2="290.0" y2="810" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="385.0" y="802" text-anchor="middle" class="message-text">403 Forbidden (Blocked)</text>
  <line x1="480.0" y1="885" x2="670.0" y2="885" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="575.0" y="877" text-anchor="middle" class="message-text">Forward request</text>
  <line x1="670.0" y1="935" x2="860.0" y2="935" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="765.0" y="927" text-anchor="middle" class="message-text">Simpan data tamu</text>
  <line x1="860.0" y1="985" x2="670.0" y2="985" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="765.0" y="977" text-anchor="middle" class="message-text">Success</text>
  <line x1="670.0" y1="1035" x2="290.0" y2="1035" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.0" y="1027" text-anchor="middle" class="message-text">Refresh list tamu</text>
  <rect x="70" y="775" width="820" height="310" class="alt-box" />
  <rect x="70" y="775" width="45" height="18" fill="#94a3b8" rx="2" ry="2" />
  <text x="92" y="788" fill="#ffffff" font-family="Inter, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">alt</text>
  <text x="125" y="789" class="alt-cond">[Role == Pimpinan (2)]</text>
  <line x1="70" y1="850" x2="890" y2="850" stroke="#94a3b8" stroke-dasharray="3,3" />
  <text x="85" y="866" class="alt-cond">[Role == Admin (1)]</text>
</svg>