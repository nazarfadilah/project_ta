<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 980" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 18px; fill: #1e293b; }
      .participant-box { rx: 6px; ry: 6px; }
      .participant-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 13px; fill: #ffffff; text-anchor: middle; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .message-line { stroke-width: 2; }
      .message-text { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #334155; }
      .self-msg-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #334155; }
      .alt-box { fill: #f8fafc; fill-opacity: 0.5; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4,4; rx: 4px; ry: 4px; }
      .alt-label { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 11px; fill: #475569; }
      .alt-cond { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 11px; fill: #64748b; }
      .activation-bar { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; width: 12px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#334155" />
    </marker>
    <marker id="reply-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#475569" stroke-width="2" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="40" y="45" class="title">9. Verifikasi & Approval Peminjaman</text>
  <line x1="100.0" y1="80" x2="100.0" y2="920" class="lifeline" />
  <line x1="290.0" y1="80" x2="290.0" y2="920" class="lifeline" />
  <line x1="480.0" y1="80" x2="480.0" y2="920" class="lifeline" />
  <line x1="670.0" y1="80" x2="670.0" y2="920" class="lifeline" />
  <line x1="860.0" y1="80" x2="860.0" y2="920" class="lifeline" />
  <g transform="translate(20.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#C9A961" />
    <text x="80" y="22" class="participant-text">Actor</text>
  </g>
  <g transform="translate(210.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#17A2B8" />
    <text x="80" y="22" class="participant-text">View</text>
  </g>
  <g transform="translate(400.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#6C757D" />
    <text x="80" y="22" class="participant-text">Middleware</text>
  </g>
  <g transform="translate(590.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#007BFF" />
    <text x="80" y="22" class="participant-text">Controller</text>
  </g>
  <g transform="translate(780.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#28A745" />
    <text x="80" y="22" class="participant-text">Database</text>
  </g>
  <g transform="translate(20.0, 930)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#C9A961" />
    <text x="80" y="22" class="participant-text">Actor</text>
  </g>
  <g transform="translate(210.0, 930)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#17A2B8" />
    <text x="80" y="22" class="participant-text">View</text>
  </g>
  <g transform="translate(400.0, 930)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#6C757D" />
    <text x="80" y="22" class="participant-text">Middleware</text>
  </g>
  <g transform="translate(590.0, 930)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#007BFF" />
    <text x="80" y="22" class="participant-text">Controller</text>
  </g>
  <g transform="translate(780.0, 930)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#28A745" />
    <text x="80" y="22" class="participant-text">Database</text>
  </g>
  <line x1="100.0" y1="120" x2="290.0" y2="120" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="195.0" y="112" text-anchor="middle" class="message-text">Buka detail peminjaman pending</text>
  <line x1="290.0" y1="170" x2="480.0" y2="170" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="385.0" y="162" text-anchor="middle" class="message-text">GET /admin/transaksi/peminjaman/{id}</text>
  <line x1="480.0" y1="220" x2="670.0" y2="220" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="575.0" y="212" text-anchor="middle" class="message-text">Forward request</text>
  <line x1="670.0" y1="270" x2="860.0" y2="270" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="765.0" y="262" text-anchor="middle" class="message-text">Get peminjaman & detail sarana</text>
  <line x1="860.0" y1="320" x2="670.0" y2="320" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="765.0" y="312" text-anchor="middle" class="message-text">Return data</text>
  <line x1="670.0" y1="370" x2="290.0" y2="370" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.0" y="362" text-anchor="middle" class="message-text">Tampilkan detail peminjaman</text>
  <path d="M 290.0 445 L 325.0 445 L 325.0 485 L 300.0 485" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="332.0" y="469" text-anchor="start" class="self-msg-text">Sembunyikan tombol Setujui/Tolak</text>
  <line x1="100.0" y1="535" x2="290.0" y2="535" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="195.0" y="527" text-anchor="middle" class="message-text">Klik tombol Setujui</text>
  <line x1="290.0" y1="585" x2="480.0" y2="585" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="385.0" y="577" text-anchor="middle" class="message-text">POST /admin/transaksi/peminjaman/{id}/approve</text>
  <line x1="480.0" y1="635" x2="670.0" y2="635" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="575.0" y="627" text-anchor="middle" class="message-text">Forward request</text>
  <line x1="670.0" y1="685" x2="860.0" y2="685" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="765.0" y="677" text-anchor="middle" class="message-text">Update statusApproval=APPROVED & set tglApproval</text>
  <line x1="670.0" y1="735" x2="860.0" y2="735" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="765.0" y="727" text-anchor="middle" class="message-text">Auto-generate Invoice record (status=UNPAID)</text>
  <line x1="860.0" y1="785" x2="670.0" y2="785" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="765.0" y="777" text-anchor="middle" class="message-text">Success</text>
  <line x1="670.0" y1="835" x2="290.0" y2="835" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.0" y="827" text-anchor="middle" class="message-text">Redirect & tampilkan status APPROVED</text>
  <rect x="70" y="410" width="820" height="475" class="alt-box" />
  <rect x="70" y="410" width="45" height="18" fill="#94a3b8" rx="2" ry="2" />
  <text x="92" y="423" fill="#ffffff" font-family="Inter, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">alt</text>
  <text x="125" y="424" class="alt-cond">[Role == Pimpinan (2)]</text>
  <line x1="70" y1="500" x2="890" y2="500" stroke="#94a3b8" stroke-dasharray="3,3" />
  <text x="85" y="516" class="alt-cond">[Role == Admin (1) atau Petugas (3)]</text>
</svg>