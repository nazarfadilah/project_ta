<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 715" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 18px; fill: #1e293b; }
      .participant-box { rx: 6px; ry: 6px; }
      .participant-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 13px; fill: #ffffff; text-anchor: middle; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .message-line { stroke-width: 2; }
      .message-text { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #334155; }
      .self-msg-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #334155; }
      .alt-box { fill: #f8fafc; fill-opacity: 0.5; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4,4; rx: 4px; ry: 4px; }
      .alt-label { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; font-size: 11px; fill: #475569; }
      .alt-cond { font-family: 'Inter', system-ui, sans-serif; font-style: italic; font-size: 11px; fill: #64748b; }
      .activation-bar { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; width: 12px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#334155" />
    </marker>
    <marker id="reply-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#475569" stroke-width="2" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="40" y="45" class="title">8. Pengajuan Peminjaman (Reservasi)</text>
  <line x1="100.0" y1="80" x2="100.0" y2="655" class="lifeline" />
  <line x1="353.33333333333337" y1="80" x2="353.33333333333337" y2="655" class="lifeline" />
  <line x1="606.6666666666667" y1="80" x2="606.6666666666667" y2="655" class="lifeline" />
  <line x1="860.0" y1="80" x2="860.0" y2="655" class="lifeline" />
  <g transform="translate(20.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#C9A961" />
    <text x="80" y="22" class="participant-text">Actor (Peminjam)</text>
  </g>
  <g transform="translate(273.33333333333337, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#17A2B8" />
    <text x="80" y="22" class="participant-text">View</text>
  </g>
  <g transform="translate(526.6666666666667, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#007BFF" />
    <text x="80" y="22" class="participant-text">Controller</text>
  </g>
  <g transform="translate(780.0, 75)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#28A745" />
    <text x="80" y="22" class="participant-text">Database</text>
  </g>
  <g transform="translate(20.0, 665)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#C9A961" />
    <text x="80" y="22" class="participant-text">Actor (Peminjam)</text>
  </g>
  <g transform="translate(273.33333333333337, 665)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#17A2B8" />
    <text x="80" y="22" class="participant-text">View</text>
  </g>
  <g transform="translate(526.6666666666667, 665)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#007BFF" />
    <text x="80" y="22" class="participant-text">Controller</text>
  </g>
  <g transform="translate(780.0, 665)">
    <rect x="0" y="0" width="160" height="35" class="participant-box" fill="#28A745" />
    <text x="80" y="22" class="participant-text">Database</text>
  </g>
  <line x1="100.0" y1="120" x2="353.33333333333337" y2="120" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="226.66666666666669" y="112" text-anchor="middle" class="message-text">Isi Form Permohonan Peminjaman</text>
  <line x1="353.33333333333337" y1="170" x2="606.6666666666667" y2="170" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="480.00000000000006" y="162" text-anchor="middle" class="message-text">Kirim Permohonan Peminjaman (POST)</text>
  <line x1="606.6666666666667" y1="220" x2="860.0" y2="220" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="733.3333333333334" y="212" text-anchor="middle" class="message-text">Cek ketersediaan Ruangan & Sarana</text>
  <line x1="860.0" y1="270" x2="606.6666666666667" y2="270" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="733.3333333333334" y="262" text-anchor="middle" class="message-text">Return status ketersediaan</text>
  <line x1="606.6666666666667" y1="345" x2="860.0" y2="345" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="733.3333333333334" y="337" text-anchor="middle" class="message-text">Simpan data peminjaman (status=PENDING)</text>
  <line x1="606.6666666666667" y1="395" x2="860.0" y2="395" stroke="#334155" class="message-line" marker-end="url(#arrow)" />
  <text x="733.3333333333334" y="387" text-anchor="middle" class="message-text">Simpan detail sarana yang dipinjam</text>
  <line x1="860.0" y1="445" x2="606.6666666666667" y2="445" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="733.3333333333334" y="437" text-anchor="middle" class="message-text">Success</text>
  <line x1="606.6666666666667" y1="495" x2="353.33333333333337" y2="495" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.00000000000006" y="487" text-anchor="middle" class="message-text">Tampilkan sukses (Menunggu Verifikasi)</text>
  <line x1="606.6666666666667" y1="570" x2="353.33333333333337" y2="570" stroke="#475569" class="message-line" stroke-dasharray="5,5" marker-end="url(#reply-arrow)" />
  <text x="480.00000000000006" y="562" text-anchor="middle" class="message-text">Tampilkan pesan error ketersediaan</text>
  <rect x="70" y="310" width="820" height="310" class="alt-box" />
  <rect x="70" y="310" width="45" height="18" fill="#94a3b8" rx="2" ry="2" />
  <text x="92" y="323" fill="#ffffff" font-family="Inter, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">alt</text>
  <text x="125" y="324" class="alt-cond">[Fasilitas Tersedia]</text>
  <line x1="70" y1="535" x2="890" y2="535" stroke="#94a3b8" stroke-dasharray="3,3" />
  <text x="85" y="551" class="alt-cond">[Fasilitas Terbooking / Stok Habis]</text>
</svg>