<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPRASA - Sequence Diagram Viewer</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-sidebar: #0f172a;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      
      --accent-color: #C9A961;
      --accent-hover: #b8953f;
      --accent-light: rgba(201, 169, 97, 0.1);
      
      --sidebar-text: #f8fafc;
      --sidebar-text-muted: #94a3b8;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }
    
    [data-theme="dark"] {
      --bg-primary: #0b0f19;
      --bg-secondary: #161f30;
      --bg-sidebar: #090d16;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border-color: #1e293b;
      
      --accent-light: rgba(201, 169, 97, 0.15);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      z-index: 10;
    }

    .sidebar-brand {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-icon {
      background-color: var(--accent-color);
      color: #000;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
    }

    .brand-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .sidebar-menu-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sidebar-text-muted);
      margin-bottom: 12px;
      padding-left: 8px;
      font-weight: 700;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: 8px;
      color: var(--sidebar-text-muted);
      cursor: pointer;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    .nav-item:hover {
      background-color: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }

    .nav-item.active {
      background-color: var(--accent-color);
      color: #0f172a;
      font-weight: 600;
    }

    .nav-item-icon {
      margin-right: 12px;
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* Main Area Styling */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Navbar */
    .top-navbar {
      height: 70px;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      box-shadow: var(--shadow-sm);
      transition: background-color 0.3s ease;
    }

    .doc-meta h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: var(--bg-primary);
      border-color: var(--text-muted);
    }

    .btn-primary {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      color: #0f172a;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #0f172a;
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background-color: var(--bg-primary);
    }

    /* Diagram Viewer Box */
    .viewer-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .meta-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: background-color 0.3s ease;
    }

    .meta-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-role {
      background-color: var(--accent-light);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
    }

    .diagram-card {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      display: flex;
      justify-content: center;
      overflow-x: auto;
      min-height: 400px;
    }

    [data-theme="dark"] .diagram-card {
      background-color: #ffffff; /* We keep SVG background white or light for better diagram contrast */
      border-color: #1e293b;
    }

    .diagram-svg-container {
      width: 100%;
      max-width: 960px;
    }

    /* Description Table Card */
    .description-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-md);
      transition: background-color 0.3s ease;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .steps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .steps-table th, .steps-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .steps-table th {
      font-weight: 600;
      color: var(--text-secondary);
      background-color: var(--bg-primary);
    }

    .steps-table tr:hover {
      background-color: var(--bg-primary);
    }

    .step-num {
      width: 50px;
      font-weight: 700;
      color: var(--accent-color);
    }

    .step-participant {
      font-weight: 600;
    }

    .arrow-icon {
      color: var(--text-muted);
      margin: 0 8px;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body data-theme="light">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <div class="brand-text">SIPRASA Diagrams</div>
    </div>
    <div class="sidebar-menu">
      <h6 class="sidebar-menu-title">Sequence Diagrams</h6>
      <ul class="nav-list" id="diagramList">
        <!-- JS will populate menu items here -->
      </ul>
    </div>
  </div>

  <!-- Main Content Viewport -->
  <div class="main-content">
    
    <!-- Top Bar -->
    <div class="top-navbar">
      <div class="doc-meta">
        <h1 id="activeTitle">Judul Diagram</h1>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" id="themeBtn" title="Ubah Tema">
          <i class="fas fa-moon"></i>
        </button>
        <button class="btn btn-primary" id="downloadBtn" title="Unduh File SVG">
          <i class="fas fa-download"></i> Unduh SVG
        </button>
      </div>
    </div>

    <!-- Scrollable Viewer Box -->
    <div class="viewer-area">
      
      <!-- Meta Information Card -->
      <div class="meta-card">
        <p id="activeDesc" style="font-size: 14.5px; line-height: 1.6; color: var(--text-secondary);">
          Deskripsi diagram di sini.
        </p>
        <div class="meta-tag-row" id="activeRoles">
          <!-- Tags populated by JS -->
        </div>
      </div>

      <!-- Diagram Graphics Box -->
      <div class="diagram-card">
        <div class="diagram-svg-container" id="svgContainer">
          <!-- SVG drawn live here by JavaScript -->
        </div>
      </div>

      <!-- Steps Description Box -->
      <div class="description-card">
        <h5 class="card-title">
          <i class="fas fa-list-ol text-accent" style="color: var(--accent-color);"></i> Detail Alur Aktivitas
        </h5>
        <div class="table-responsive">
          <table class="steps-table">
            <thead>
              <tr>
                <th style="width: 60px;">No</th>
                <th style="width: 250px;">Arah Komunikasi</th>
                <th>Aksi / Pesan</th>
              </tr>
            </thead>
            <tbody id="stepsTableBody">
              <!-- JS will write rows here -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Embedded JS Script Logic -->
  <script>
    // Theme logic
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', newTheme);
      
      const icon = themeBtn.querySelector('i');
      if (newTheme === 'dark') {
        icon.className = 'fas fa-sun';
      } else {
        icon.className = 'fas fa-moon';
      }
    });

      "10_checkin_checkout": {

        "roles": ["Petugas", "Admin"],

        "steps": [

          ["msg", "Database", "Controller", "Success", "reply"],
          ["msg", "Controller", "View", "Refresh page & status menjadi CHECK_IN", "reply"],
          ["msg", "Actor (Petugas)", "View", "Tamu selesai, klik Check-Out & isi form kerusakan", "call"],
          ["msg", "View", "Middleware", "POST /admin/transaksi/peminjaman/{id}/check-out", "call"],
          ["msg", "Middleware", "Controller", "Forward request", "call"],
          ["msg", "Controller", "Database", "Update statusPeminjaman=CHECK_OUT, checkOut=now()", "call"],
          ["msg", "Controller", "Database", "Simpan kondisiReturn, denda, & biayaTambahan", "call"],
          ["msg", "Controller", "Database", "Update Invoice (tambah biaya denda ke totalHarga)", "call"],

      },
      "11_kelola_invoice": {

          ["msg", "Database", "Controller", "Return data", "reply"],
          ["msg", "Controller", "View", "Tampilkan Invoice Detail", "reply"],
          ["msg", "Actor (Admin)", "View", "Konfirmasi Pembayaran Lunas", "call"],
          ["msg", "View", "Middleware", "POST /admin/transaksi/invoice/{id}/pay", "call"],
          ["alt_start", "Role == Pimpinan (2)"],
          ["msg", "Middleware", "View", "403 Forbidden (Blocked)", "reply"],

          ["msg", "Middleware", "Controller", "Forward request", "call"],
          ["msg", "Controller", "Database", "Update statusInvoice=PAID, status_pembayaran=LUNAS", "call"],

      "12_kelola_berita": {

        "participants": ["Actor", "View", "Middleware", "Controller", "Database"],
        "steps": [
          ["msg", "Actor (Petugas)", "View", "Submit berita baru", "call"],
          ["msg", "View", "Middleware", "POST /admin/berita", "call"],
          ["msg", "Middleware", "Controller", "Forward request", "call"],
          ["msg", "Controller", "Database", "Simpan berita dengan status=draft", "call"],
          ["msg", "Database", "Controller", "Success", "reply"],

          ["msg", "Middleware", "Controller", "Forward request", "call"],
          ["msg", "Controller", "Database", "Update status=approved & set tanggal_publish", "call"],

      },
      "13_kelola_landing_page": {

        "description": "Pengaturan informasi profil, FAQ, dan galeri web publik (Hanya untuk Admin).",

        "steps": [
          ["msg", "Actor", "View", "Buka kelola Landing Page", "call"],

          ["alt_start", "Role != Admin (1)"],
          ["msg", "Middleware", "View", "403 Forbidden (Blocked)", "reply"],
          ["alt_else", "Role == Admin (1)"],
          ["msg", "Middleware", "Controller", "Forward request", "call"],

      "14_cetak_laporan": {
        "title": "14. Cetak Laporan",
        "description": "Cetak dan ekspor laporan peminjaman & penggunaan fasilitas (Admin & Pimpinan).",
        "roles": ["Admin", "Pimpinan"],
        "participants": ["Actor", "View", "Middleware", "Controller", "Database"],
        "steps": [
          ["msg", "Actor", "View", "Buka Halaman Laporan & pilih filter tanggal", "call"],
          ["msg", "View", "Middleware", "GET /admin/laporan", "call"],
          ["alt_start", "Role == Petugas (3)"],
          ["msg", "Middleware", "View", "403 Forbidden (Blocked)", "reply"],
          ["alt_else", "Role in [Admin, Pimpinan]"],
          ["msg", "Middleware", "Controller", "Forward request", "call"],
          ["msg", "Controller", "Database", "Query aggregated peminjaman & usage data", "call"],
          ["msg", "Database", "Controller", "Return data", "reply"],
          ["msg", "Controller", "View", "Tampilkan Halaman Laporan dengan data & tombol Cetak", "reply"],
          ["alt_end"]
        ]
      }
    };

    const participantColors = {
      "Actor": "#C9A961",
      "Actor (Peminjam)": "#C9A961",
      "Actor (Petugas)": "#C9A961",
      "View": "#17A2B8",
      "Middleware": "#6C757D",
      "Controller": "#007BFF",
      "Database": "#28A745"
    };

    function getParticipantColor(p) {
      for (const [key, val] of Object.entries(participantColors)) {
        if (p.includes(key)) return val;
      }
      return "#333333";
    }

    // Populate Sidebar Navigation
    const diagramList = document.getElementById('diagramList');
    let activeKey = Object.keys(diagrams)[0];

    Object.entries(diagrams).forEach(([key, data]) => {
      const li = document.createElement('li');
      const cleanTitle = data.title.split('. ')[1] || data.title;
      li.className = `nav-item ${key === activeKey ? 'active' : ''}`;
      li.innerHTML = `<i class="fas fa-project-diagram nav-item-icon"></i> ${cleanTitle}`;
      li.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        activeKey = key;
        loadDiagram(key);
      });
      diagramList.appendChild(li);
    });

    // Drawing/Rendering SVG live on the page
    function drawSequenceSVG(data) {
      const title = data.title;
      const participants = data.participants;
      const steps = data.steps;

      const width = 960;
      const margin_x = 100;
      const n_part = participants.length;
      const spacing_x = n_part > 1 ? (width - 2 * margin_x) / (n_part - 1) : 0;

      function getX(p) {
        let idx = participants.indexOf(p);
        if (idx === -1) {
          idx = 0;
          for (let i = 0; i < participants.length; i++) {
            if (p.split(' ')[0].includes(participants[i].split(' ')[0]) || participants[i].split(' ')[0].includes(p.split(' ')[0])) {
              idx = i;
              break;
            }
          }
        }
        return margin_x + idx * spacing_x;
      }

      // Step coordinates calculation
      let y = 120;
      const renderedSteps = [];
      const altStack = [];

      steps.forEach((step, index) => {
        const stype = step[0];
        if (stype === "msg") {
          const [_, p_from, p_to, label, mtype] = step;
          const x1 = getX(p_from);
          const x2 = getX(p_to);
          renderedSteps.push({
            type: "msg",
            from: p_from, to: p_to,
            x1, x2,
            y,
            label,
            mtype
          });
          y += 50;
        } else if (stype === "self") {
          const [_, p, label] = step;
          const x = getX(p);
          renderedSteps.push({
            type: "self",
            x,
            y,
            label
          });
          y += 65;
        } else if (stype === "alt_start") {
          const [_, cond] = step;
          altStack.push({
            y_start: y - 10,
            cond,
            splits: [],
            idx: renderedSteps.length
          });
          y += 25;
        } else if (stype === "alt_else") {
          const [_, cond] = step;
          if (altStack.length > 0) {
            altStack[altStack.length - 1].splits.push([y - 10, cond]);
          }
          y += 25;
        } else if (stype === "alt_end") {
          if (altStack.length > 0) {
            const alt = altStack.pop();
            renderedSteps.push({
              type: "alt_block",
              y_start: alt.y_start,
              y_end: y,
              cond: alt.cond,
              splits: alt.splits
            });
            y += 15;
          }
        }
      });

      const total_height = y + 80;

      // Construct SVG Elements String
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${total_height}" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Outfit', sans-serif; font-weight: bold; font-size: 20px; fill: #1e293b; }
      .participant-box { rx: 6px; ry: 6px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06)); }
      .participant-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; fill: #ffffff; text-anchor: middle; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .message-line { stroke-width: 2; transition: stroke 0.2s; }
      .message-line:hover { stroke: #C9A961; }
      .message-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: #334155; }
      .self-msg-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #334155; }
      .alt-box { fill: #f8fafc; fill-opacity: 0.6; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4,4; rx: 4px; ry: 4px; }
      .alt-cond { font-family: 'Inter', sans-serif; font-style: italic; font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#334155" />
    </marker>
    <marker id="reply-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#475569" stroke-width="2" />
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <!-- Lifelines -->`;

      participants.forEach(p => {
        const x = getX(p);
        svg += `\n  <line x1="${x}" y1="80" x2="${x}" y2="${total_height - 60}" class="lifeline" />`;
      });

      svg += `\n\n  <!-- Top Headers -->`;
      participants.forEach(p => {
        const x = getX(p);
        const color = getParticipantColor(p);
        svg += `\n  <g transform="translate(${x - 80}, 70)">
    <rect x="0" y="0" width="160" height="36" class="participant-box" fill="${color}" />
    <text x="80" y="22" class="participant-text">${p}</text>
  </g>`;
      });

      svg += `\n\n  <!-- Bottom Footers -->`;
      participants.forEach(p => {
        const x = getX(p);
        const color = getParticipantColor(p);
        svg += `\n  <g transform="translate(${x - 80}, ${total_height - 48})">
    <rect x="0" y="0" width="160" height="36" class="participant-box" fill="${color}" />
    <text x="80" y="22" class="participant-text">${p}</text>
  </g>`;
      });

      svg += `\n\n  <!-- Steps Drawing -->`;
      renderedSteps.forEach(s => {
        if (s.type === "msg") {
          const stroke = s.mtype === "call" ? 'stroke="#334155"' : 'stroke="#475569" stroke-dasharray="5,5"';
          const marker = s.mtype === "call" ? 'marker-end="url(#arrow)"' : 'marker-end="url(#reply-arrow)"';
          svg += `\n  <line x1="${s.x1}" y1="${s.y}" x2="${s.x2}" y2="${s.y}" class="message-line" ${stroke} ${marker} />
  <text x="${(s.x1 + s.x2)/2}" y="${s.y - 8}" text-anchor="middle" class="message-text">${s.label}</text>`;
        } else if (s.type === "self") {
          svg += `\n  <path d="M ${s.x} ${s.y} L ${s.x+35} ${s.y} L ${s.x+35} ${s.y+40} L ${s.x+10} ${s.y+40}" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="${s.x + 42}" y="${s.y + 24}" text-anchor="start" class="self-msg-text">${s.label}</text>`;
        } else if (s.type === "alt_block") {
          const x_min = margin_x - 30;
          const x_max = width - margin_x + 30;
          svg += `\n  <!-- Alt Block [${s.cond}] -->
  <rect x="${x_min}" y="${s.y_start}" width="${x_max - x_min}" height="${s.y_end - s.y_start}" class="alt-box" />
  <rect x="${x_min}" y="${s.y_start}" width="42" height="18" fill="#94a3b8" rx="2" ry="2" />
  <text x="${x_min + 21}" y="${s.y_start + 13}" fill="#ffffff" font-family="Inter" font-weight="bold" font-size="10" text-anchor="middle">alt</text>
  <text x="${x_min + 50}" y="${s.y_start + 13}" class="alt-cond">[${s.cond}]</text>`;
          
          s.splits.forEach(([split_y, split_cond]) => {
            svg += `\n  <line x1="${x_min}" y1="${split_y}" x2="${x_max}" y2="${split_y}" stroke="#94a3b8" stroke-dasharray="3,3" />
  <text x="${x_min + 15}" y="${split_y + 16}" class="alt-cond">[${split_cond}]</text>`;
          });
        }
      });

      svg += `\n</svg>`;
      return svg;
    }

    // Populate metadata & description table
    function loadDiagram(key) {
      const data = diagrams[key];
      document.getElementById('activeTitle').innerText = data.title;
      document.getElementById('activeDesc').innerText = data.description;
      
      // Roles tags
      const rolesContainer = document.getElementById('activeRoles');
      rolesContainer.innerHTML = '';
      data.roles.forEach(role => {
        const span = document.createElement('span');
        span.className = 'tag tag-role';
        span.innerText = role;
        rolesContainer.appendChild(span);
      });

      // Draw SVG
      const container = document.getElementById('svgContainer');
      container.innerHTML = drawSequenceSVG(data);

      // Write descriptive action table
      const tbody = document.getElementById('stepsTableBody');
      tbody.innerHTML = '';
      
      let stepCounter = 1;
      data.steps.forEach(step => {
        const stype = step[0];
        if (stype === "msg") {
          const [_, from, to, msg, mtype] = step;
          const tr = document.createElement('tr');
          const direction = mtype === 'call' ? 
            `<span class="step-participant">${from}</span> <i class="fas fa-arrow-right arrow-icon"></i> <span class="step-participant">${to}</span>` :
            `<span class="step-participant">${from}</span> <i class="fas fa-long-arrow-alt-left arrow-icon" style="color:#C9A961"></i> <span class="step-participant">${to}</span>`;
          
          tr.innerHTML = `
            <td class="step-num">${stepCounter++}</td>
            <td>${direction}</td>
            <td>${msg}</td>
          `;
          tbody.appendChild(tr);
        } else if (stype === "self") {
          const [_, p, msg] = step;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="step-num">${stepCounter++}</td>
            <td><span class="step-participant">${p}</span> <i class="fas fa-sync-alt arrow-icon"></i> (Internal)</td>
            <td>${msg}</td>
          `;
          tbody.appendChild(tr);
        } else if (stype === "alt_start") {
          const [_, cond] = step;
          const tr = document.createElement('tr');
          tr.style.backgroundColor = 'var(--accent-light)';
          tr.innerHTML = `
            <td colspan="3" style="font-weight:700; color:var(--accent-color);">
              <i class="fas fa-code-branch me-2"></i> PERCABANGAN: JIKA [${cond}]
            </td>
          `;
          tbody.appendChild(tr);
        } else if (stype === "alt_else") {
          const [_, cond] = step;
          const tr = document.createElement('tr');
          tr.style.backgroundColor = 'var(--accent-light)';
          tr.innerHTML = `
            <td colspan="3" style="font-weight:700; color:var(--accent-color);">
              <i class="fas fa-code-branch me-2"></i> ATAU: JIKA [${cond}]
            </td>
          `;
          tbody.appendChild(tr);
        }
      });
    }

    // Download action
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const svgEl = document.getElementById('svgContainer').querySelector('svg');
      if (!svgEl) return;
      
      const svgString = new XMLSerializer().serializeToString(svgEl);
      const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
      const svgUrl = URL.createObjectURL(svgBlob);
      
      const downloadLink = document.createElement("a");
      downloadLink.href = svgUrl;
      downloadLink.download = `${activeKey}.svg`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Default load
    loadDiagram(activeKey);
  </script>
</body>
</html>
