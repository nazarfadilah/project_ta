<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPRASA - Sequence Diagram Viewer</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-sidebar: #0f172a;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      
      --accent-color: #C9A961;
      --accent-hover: #b8953f;
      --accent-light: rgba(201, 169, 97, 0.1);
      
      --sidebar-text: #f8fafc;
      --sidebar-text-muted: #94a3b8;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }
    
    [data-theme="dark"] {
      --bg-primary: #0b0f19;
      --bg-secondary: #161f30;
      --bg-sidebar: #090d16;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border-color: #1e293b;
      
      --accent-light: rgba(201, 169, 97, 0.15);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      z-index: 10;
    }

    .sidebar-brand {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-icon {
      background-color: var(--accent-color);
      color: #000;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
    }

    .brand-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .sidebar-menu-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sidebar-text-muted);
      margin-bottom: 12px;
      padding-left: 8px;
      font-weight: 700;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: 8px;
      color: var(--sidebar-text-muted);
      cursor: pointer;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: all 0.2s ease;
      line-height: 1.4;
    }

    .nav-item:hover {
      background-color: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }

    .nav-item.active {
      background-color: var(--accent-color);
      color: #0f172a;
      font-weight: 600;
    }

    .nav-item-icon {
      margin-right: 12px;
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* Main Area Styling */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Navbar */
    .top-navbar {
      height: 70px;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      box-shadow: var(--shadow-sm);
      transition: background-color 0.3s ease;
    }

    .doc-meta h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: var(--bg-primary);
      border-color: var(--text-muted);
    }

    .btn-primary {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      color: #0f172a;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #0f172a;
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background-color: var(--bg-primary);
    }

    /* Diagram Viewer Box */
    .viewer-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .meta-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: background-color 0.3s ease;
    }

    .meta-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-role {
      background-color: var(--accent-light);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
    }

    .diagram-card {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      display: flex;
      justify-content: center;
      overflow-x: auto;
      min-height: 400px;
    }

    [data-theme="dark"] .diagram-card {
      background-color: #ffffff; /* We keep SVG background white or light for better diagram contrast */
      border-color: #1e293b;
    }

    .diagram-svg-container {
      width: 100%;
      max-width: 960px;
    }

    /* Description Table Card */
    .description-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-md);
      transition: background-color 0.3s ease;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .steps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .steps-table th, .steps-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .steps-table th {
      font-weight: 600;
      color: var(--text-secondary);
      background-color: var(--bg-primary);
    }

    .steps-table tr:hover {
      background-color: var(--bg-primary);
    }

    .step-num {
      width: 50px;
      font-weight: 700;
      color: var(--accent-color);
    }

    .step-participant {
      font-weight: 600;
    }

    .arrow-icon {
      color: var(--text-muted);
      margin: 0 8px;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body data-theme="light">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <div class="brand-text">SIPRASA Diagrams</div>
    </div>
    <div class="sidebar-menu">
      <h6 class="sidebar-menu-title">Sequence Diagrams</h6>
      <ul class="nav-list" id="diagramList">
        <!-- JS will populate menu items here -->
      </ul>
    </div>
  </div>

  <!-- Main Content Viewport -->
  <div class="main-content">
    
    <!-- Top Bar -->
    <div class="top-navbar">
      <div class="doc-meta">
        <h1 id="activeTitle">Judul Diagram</h1>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" id="themeBtn" title="Ubah Tema">
          <i class="fas fa-moon"></i>
        </button>
        <button class="btn btn-primary" id="downloadBtn" title="Unduh File PNG">
          <i class="fas fa-download"></i> Unduh PNG
        </button>
      </div>
    </div>

    <!-- Scrollable Viewer Box -->
    <div class="viewer-area">
      
      <!-- Meta Information Card -->
      <div class="meta-card">
        <p id="activeDesc" style="font-size: 14.5px; line-height: 1.6; color: var(--text-secondary);">
          Deskripsi diagram di sini.
        </p>
        <div class="meta-tag-row" id="activeRoles">
          <!-- Tags populated by JS -->
        </div>
      </div>

      <!-- Diagram Graphics Box -->
      <div class="diagram-card">
        <div class="diagram-svg-container" id="svgContainer">
          <!-- SVG drawn live here by JavaScript -->
        </div>
      </div>

      <!-- Steps Description Box -->
      <div class="description-card">
        <h5 class="card-title">
          <i class="fas fa-list-ol text-accent" style="color: var(--accent-color);"></i> Detail Alur Aktivitas
        </h5>
        <div class="table-responsive">
          <table class="steps-table">
            <thead>
              <tr>
                <th style="width: 60px;">No</th>
                <th style="width: 250px;">Arah Komunikasi</th>
                <th>Aksi / Pesan</th>
              </tr>
            </thead>
            <tbody id="stepsTableBody">
              <!-- JS will write rows here -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Embedded JS Script Logic -->

    // Theme logic
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', newTheme);
      
      const icon = themeBtn.querySelector('i');
      if (newTheme === 'dark') {
        icon.className = 'fas fa-sun';
      } else {
        icon.className = 'fas fa-moon';
      }
    });

    // Populate Sidebar Navigation
    const diagramList = document.getElementById('diagramList');
    let activeKey = Object.keys(diagrams)[0];

    Object.entries(diagrams).forEach(([key, data]) => {
      const li = document.createElement('li');
      const cleanTitle = data.title.split('. ')[1] || data.title;
      li.className = `nav-item ${key === activeKey ? 'active' : ''}`;
      li.innerHTML = `<i class="fas fa-project-diagram nav-item-icon"></i> ${cleanTitle}`;
      li.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        activeKey = key;
        loadDiagram(key);
      });
      diagramList.appendChild(li);
    });

    // Populate metadata & description table
    function loadDiagram(key) {
      const data = diagrams[key];
      document.getElementById('activeTitle').innerText = data.title;
      document.getElementById('activeDesc').innerText = data.description;
      
      // Roles tags
      const rolesContainer = document.getElementById('activeRoles');
      rolesContainer.innerHTML = '';
      data.roles.forEach(role => {
        const span = document.createElement('span');
        span.className = 'tag tag-role';
        span.innerText = role;
        rolesContainer.appendChild(span);
      });

      // Display PNG Image
      const container = document.getElementById('svgContainer');
      container.innerHTML = `<img src="${key}.png" alt="${data.title}" style="max-width: 100%; height: auto; display: block; margin: 0 auto; box-shadow: var(--shadow-md); border-radius: 8px;" />`;

      // Write descriptive action table
      const tbody = document.getElementById('stepsTableBody');
      tbody.innerHTML = '';
      
      let stepCounter = 1;
      data.steps.forEach(step => {
        const stype = step[0];
        if (stype === "msg") {
          const [_, from, to, msg, mtype] = step;
          const tr = document.createElement('tr');
          const direction = mtype === 'call' ? 
            `<span class="step-participant">${from}</span> <i class="fas fa-arrow-right arrow-icon"></i> <span class="step-participant">${to}</span>` :
            `<span class="step-participant">${from}</span> <i class="fas fa-long-arrow-alt-left arrow-icon" style="color:#C9A961"></i> <span class="step-participant">${to}</span>`;
          
          tr.innerHTML = `
            <td class="step-num">${stepCounter++}</td>
            <td>${direction}</td>
            <td>${msg}</td>
          `;
          tbody.appendChild(tr);
        } else if (stype === "self") {
          const [_, p, msg] = step;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="step-num">${stepCounter++}</td>
            <td><span class="step-participant">${p}</span> <i class="fas fa-sync-alt arrow-icon"></i> (Internal)</td>
            <td>${msg}</td>
          `;
          tbody.appendChild(tr);
        } else if (stype === "alt_start") {
          const [_, cond] = step;
          const tr = document.createElement('tr');
          tr.style.backgroundColor = 'var(--accent-light)';
          tr.innerHTML = `
            <td colspan="3" style="font-weight:700; color:var(--accent-color);">
              <i class="fas fa-code-branch me-2"></i> PERCABANGAN: JIKA [${cond}]
            </td>
          `;
          tbody.appendChild(tr);
        } else if (stype === "alt_else") {
          const [_, cond] = step;
          const tr = document.createElement('tr');
          tr.style.backgroundColor = 'var(--accent-light)';
          tr.innerHTML = `
            <td colspan="3" style="font-weight:700; color:var(--accent-color);">
              <i class="fas fa-code-branch me-2"></i> ATAU: JIKA [${cond}]
            </td>
          `;
          tbody.appendChild(tr);
        }
      });
    }

    // Download action
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const downloadLink = document.createElement("a");
      downloadLink.href = `${activeKey}.png`;
      downloadLink.download = `${activeKey}.png`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Default load
    loadDiagram(activeKey);
  </script>
